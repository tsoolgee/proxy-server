name: Proxy Downloader
on:
  repository_dispatch:
    types: [proxy_request]
jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Download File
        run: |
          mkdir -p downloads
          curl -L "${{ github.event.client_payload.url }}" -o "downloads/file_from_proxy"
      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/file_from_proxy
          git commit -m "Proxy download: ${{ github.event.client_payload.url }}"
          git push
